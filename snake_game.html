<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Snake Game</title>

<style>
:root{
    --bg:#0f172a;
    --board:#1e293b;
    --snake:#22c55e;
    --snake2:#38bdf8;
    --food:#ef4444;
    --text:#fff;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:Arial;
    display:flex;
    flex-direction:column;
    align-items:center;
}

header{
    width:95vw;
    max-width:900px;
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
    margin:10px 0;
}

.controls{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

button,select{
    padding:6px 10px;
    border-radius:6px;
    border:none;
    cursor:pointer;
}

canvas{
    background:var(--board);
    border-radius:10px;
    box-shadow:0 0 20px rgba(0,0,0,.4);
    touch-action:none;
}
</style>
</head>

<body>

<header>
<div>
Score: <span id="score">0</span> |
High: <span id="high">0</span> |
Lives: <span id="lives">3</span>
</div>

<div class="controls">
<select id="difficulty">
<option value="150">Easy</option>
<option value="100" selected>Medium</option>
<option value="60">Hard</option>
</select>

<select id="theme">
<option value="green">Green</option>
<option value="blue">Blue</option>
<option value="purple">Purple</option>
</select>

<button onclick="toggleSound()">🔊 Sound</button>
<button onclick="toggleMusic()">🎵 Music</button>
<button onclick="togglePause()">⏸ Pause</button>
<button onclick="toggleFullscreen()">⛶ Fullscreen</button>
<button onclick="toggleMode()">👥 2P Mode</button>
</div>
</header>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let grid = 20;
let size, tiles;

let snake, snake2, food, obstacles;
let dx=1, dy=0;
let dx2=-1, dy2=0;

let score=0, lives=3;
let paused=false, sound=true, music=false, mode2P=false;

let speed=100;
let interval;

let startX, startY;

let musicOsc;

function resize(){
    size = Math.min(window.innerWidth*0.9, window.innerHeight*0.7);
    size = Math.floor(size/grid)*grid;
    canvas.width=size;
    canvas.height=size;
    tiles=size/grid;
}
window.addEventListener("resize",resize);
resize();

function reset(){
    snake=[{x:10,y:10}];
    snake2=[{x:15,y:15}];
    dx=1; dy=0;
    dx2=-1; dy2=0;
    score=0;
    lives=3;
    obstacles=[];
    spawnFood();
    genObstacles();
    updateUI();
}

function spawnFood(){
    food={
        x:Math.floor(Math.random()*tiles),
        y:Math.floor(Math.random()*tiles)
    };
}

function genObstacles(){
    obstacles=[];
    let count = speed==150?3:speed==100?6:10;
    for(let i=0;i<count;i++){
        obstacles.push({
            x:Math.floor(Math.random()*tiles),
            y:Math.floor(Math.random()*tiles)
        });
    }
}

function beep(freq=400){
    if(!sound) return;
    let a=new AudioContext();
    let o=a.createOscillator();
    o.connect(a.destination);
    o.frequency.value=freq;
    o.start();
    setTimeout(()=>o.stop(),80);
}

function musicToggle(){
    if(!music){
        musicOsc = new AudioContext();
        let o = musicOsc.createOscillator();
        o.type="sine";
        o.frequency.value=200;
        o.connect(musicOsc.destination);
        o.start();
        musicOsc.osc=o;
    }else{
        musicOsc?.osc?.stop();
        musicOsc?.close();
    }
}

function update(){
    if(paused) return;

    let head={x:snake[0].x+dx,y:snake[0].y+dy};

    if(collision(head, snake) || hitObstacle(head)){
        lose();
        return;
    }

    snake.unshift(head);

    if(head.x==food.x && head.y==food.y){
        score+=10;
        beep(600);
        spawnFood();
    }else snake.pop();

    if(mode2P){
        let h2={x:snake2[0].x+dx2,y:snake2[0].y+dy2};
        if(collision(h2,snake2)) lose();
        snake2.unshift(h2);
        snake2.pop();
    }

    updateUI();
}

function collision(h, s){
    return h.x<0||h.y<0||h.x>=tiles||h.y>=tiles||
    s.some(p=>p.x==h.x&&p.y==h.y);
}

function hitObstacle(h){
    return obstacles.some(o=>o.x==h.x&&o.y==h.y);
}

function lose(){
    lives--;
    beep(200);

    if(lives>0){
        resetRound();
    }else{
        let hs=localStorage.getItem("high")||0;
        if(score>hs){
            localStorage.setItem("high",score);
        }

        if(confirm("Game Over! Restart?")){
            reset();
        }
    }
}

function resetRound(){
    snake=[{x:10,y:10}];
    dx=1;dy=0;
}

function draw(){
    ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--board');
    ctx.fillRect(0,0,size,size);

    ctx.fillStyle="red";
    ctx.fillRect(food.x*grid,food.y*grid,grid-2,grid-2);

    ctx.fillStyle="gray";
    obstacles.forEach(o=>{
        ctx.fillRect(o.x*grid,o.y*grid,grid,grid);
    });

    ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--snake');
    snake.forEach(s=>{
        ctx.fillRect(s.x*grid,s.y*grid,grid-2,grid-2);
    });

    if(mode2P){
        ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--snake2');
        snake2.forEach(s=>{
            ctx.fillRect(s.x*grid,s.y*grid,grid-2,grid-2);
        });
    }
}

function loop(){
    update();
    draw();
}

function start(){
    clearInterval(interval);
    interval=setInterval(loop,speed);
}

function updateUI(){
    document.getElementById("score").innerText=score;
    document.getElementById("lives").innerText=lives;
    document.getElementById("high").innerText=localStorage.getItem("high")||0;
}

/* CONTROLS */
document.addEventListener("keydown",e=>{
    if(e.key=="ArrowUp" && dy!=1){dx=0;dy=-1}
    if(e.key=="ArrowDown" && dy!=-1){dx=0;dy=1}
    if(e.key=="ArrowLeft" && dx!=1){dx=-1;dy=0}
    if(e.key=="ArrowRight" && dx!=-1){dx=1;dy=0}
});

/* SWIPE */
canvas.addEventListener("touchstart",e=>{
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
});

canvas.addEventListener("touchend",e=>{
    let dxm=e.changedTouches[0].clientX-startX;
    let dym=e.changedTouches[0].clientY-startY;

    if(Math.abs(dxm)>Math.abs(dym)){
        if(dxm>0&&dx!=-1){dx=1;dy=0}
        else if(dxm<0&&dx!=1){dx=-1;dy=0}
    }else{
        if(dym>0&&dy!=-1){dx=0;dy=1}
        else if(dym<0&&dy!=1){dx=0;dy=-1}
    }
});

/* UI */
document.getElementById("difficulty").onchange=e=>{
    speed=parseInt(e.target.value);
    start();
    genObstacles();
};

function togglePause(){paused=!paused;}
function toggleSound(){sound=!sound;}
function toggleMusic(){music=!music;musicToggle();}
function toggleMode(){mode2P=!mode2P;reset();}
function toggleFullscreen(){
    if(!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
}

/* THEMES */
document.getElementById("theme").onchange=e=>{
    const t={
        green:["#0f172a","#1e293b","#22c55e"],
        blue:["#0a1a2f","#0f2a3f","#38bdf8"],
        purple:["#1b1033","#2a1450","#a855f7"]
    }[e.target.value];

    document.documentElement.style.setProperty('--bg',t[0]);
    document.documentElement.style.setProperty('--board',t[1]);
    document.documentElement.style.setProperty('--snake',t[2]);
};

reset();
start();
updateUI();

</script>

</body>
</html>
